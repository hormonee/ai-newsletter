# src/my_crew/config/tasks.yaml

research_task:
  description: >
    오늘({current_date}) 날짜를 기준으로 AI 업계의 주요 뉴스, 신규 모델 발표, 투자 소식 등을 검색하세요.
    중복되거나 가벼운 가십거리는 제외하고, 의미 있는 10개의 소식을 선정하세요.
    각 소식은 '제목'과 '원문 URL'을 반드시 포함해야 합니다.
  expected_output: >
    10개의 핵심 이슈 리스트 (제목 및 URL 포함)
  agent: news_researcher
  
email_formatting_task:
  description: >
    전달받은 10개의 이슈를 바탕으로 이메일 본문을 작성하세요.
    형식은 다음과 같습니다:
    1. 오늘 AI 한 줄 요약
    2. 10가지 이슈 상세 (이슈 제목 / 3~4문장 요약 / 출처 링크)
    3. 앞으로의 관전 포인트
    톤은 전문적이면서도 친절해야 합니다.
  expected_output: >
    깔끔하게 정리된 이메일 전송용 텍스트
  agent: summary_editor